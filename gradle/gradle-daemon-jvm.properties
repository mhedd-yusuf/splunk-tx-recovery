# Pin the JVM that runs the Gradle daemon for this project. Independent of
# IntelliJ's "Gradle JVM" picker — when Gradle starts up, it reads this file
# and provisions a matching JDK.
#
# Why pinned: Gradle 9.x requires Java 17+ to run. If a developer's IntelliJ
# is configured with an older JDK (e.g. Amazon Corretto 11) as the Gradle JVM,
# the build crashes with a class-file-version mismatch:
#   "compiled by a more recent version of the Java Runtime (class file version
#    61.0), this version of the Java Runtime only recognizes up to 55.0"
#
# This file is read by Gradle 8.8+; we use 9.2.1, so it always applies.
toolchainVersion=25
